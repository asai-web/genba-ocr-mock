/* スキャン結果の明細を現場ごとに集計（実額積み上げ）。明細が無ければ書類全体を1件扱い */
const allocationsOf = (r)=>{
  const items = (r.items&&r.items.length) ? r.items : [{ name:"", amount:r.total, pid:r.pid_hint }];
  const g={};
  items.forEach(it=>{ const k=it.pid||""; (g[k]=g[k]||{amount:0,names:[]}); g[k].amount+=(it.amount||0); g[k].names.push(it.name); });
  return Object.entries(g).map(([pid,x])=>({ pid, amount:x.amount, memo:x.names.filter(Boolean)[0]||"" }));
};
/* 未確認トレイで「見ずにそのまま確定してよい」書類か（全明細に現場あり・全明細読取済み・未登録現場なし・明細合計＝原本合計） */
const isReady = (r)=>{
  if(!r || r.fail || r.project_new || !(r.total>0)) return false;
  const items = (r.items&&r.items.length) ? r.items : [{ amount:r.total, pid:r.pid_hint }];
  const allAssigned = items.every(it=> !!it.pid);
  const allRead = items.every(it=> it.amount!=null && !it.unread);
  const sum = items.reduce((s,it)=>s+(it.amount||0),0);
  return allAssigned && allRead && sum===r.total;
};

/* ============================== 集計 ============================== */
function useAgg(projects, docs){
  return useMemo(()=>projects.map(p=>{
    const ds = docs.filter(d=>d.pid===p.id);
    const cost  = ds.filter(d=>d.dir==="cost").reduce((s,d)=>s+d.total,0);
    const sales = ds.filter(d=>d.dir==="sales").reduce((s,d)=>s+d.total,0) || p.sales;
    const profit = sales - cost;
    const rate = sales? Math.round(profit/sales*100):0;
    return { ...p, cost, sales, profit, rate, count:ds.length };
  }),[projects,docs]);
}

/* ============================== 月次・日次 収支表 ============================== */
const monthLabel = (m)=> m ? m.slice(0,4)+"年"+(+m.slice(5,7))+"月" : "";
function MonthlyView({docs, onExport}){
  const months = useMemo(()=>{ const s={}; docs.forEach(d=>s[d.date.slice(0,7)]=1); return Object.keys(s).sort().reverse(); },[docs]);
  const [mi,setMi] = useState(0);
  const month = months[mi] || "";
  const md = docs.filter(d=>d.date.slice(0,7)===month);
  const byDay = {};
  md.forEach(d=>{ byDay[d.date]=byDay[d.date]||{date:d.date,sales:0,cost:0}; byDay[d.date][d.dir]+=d.total; });
  const days = Object.values(byDay).sort((a,b)=>a.date.localeCompare(b.date));
  const tSales = md.filter(d=>d.dir==="sales").reduce((s,d)=>s+d.total,0);
  const tCost  = md.filter(d=>d.dir==="cost").reduce((s,d)=>s+d.total,0);
  const tProfit = tSales - tCost;
  const rate = tSales? Math.round(tProfit/tSales*100):0;
  const doExport=(kind)=>{
    const header=["日付","売上","原価","粗利"];
    const rows=days.map(d=>[d.date, d.sales, d.cost, d.sales-d.cost]);
    rows.push(["合計", tSales, tCost, tProfit]);
    onExport({ kind, title:`${monthLabel(month)} 月次収支`, matrix:[header,...rows] });
  };
  return (
    <div className="px-4 pt-4">
      {/* 月セレクタ */}
      <div className="flex items-center justify-between card p-2">
        <button onClick={()=>setMi(i=>Math.min(months.length-1,i+1))} disabled={mi>=months.length-1}
          className="tap w-10 h-9 rounded-lg hover:bg-ink-100 text-ink-600 text-lg disabled:opacity-30">‹</button>
        <div className="font-black text-ink-900">{monthLabel(month)}</div>
        <button onClick={()=>setMi(i=>Math.max(0,i-1))} disabled={mi<=0}
          className="tap w-10 h-9 rounded-lg hover:bg-ink-100 text-ink-600 text-lg disabled:opacity-30">›</button>
      </div>

      {/* 月次サマリー */}
      <div className="rounded-2xl bg-gradient-to-br from-ink-900 to-ink-700 text-white p-4 mt-3">
        <div className="text-[11px] text-ink-300 font-bold">{monthLabel(month)}の粗利</div>
        <div className={"text-3xl font-black num mt-0.5 "+(tProfit<0?"text-rose-300":"")}>{yen(tProfit)}</div>
        <div className="flex gap-4 mt-3 text-[12px]">
          <div><span className="text-ink-400">売上 </span><span className="num font-bold">{man(tSales)}</span></div>
          <div><span className="text-ink-400">原価 </span><span className="num font-bold text-brand-300">{man(tCost)}</span></div>
          <div><span className="text-ink-400">粗利率 </span><span className="num font-bold">{rate}%</span></div>
        </div>
      </div>

      {/* 日次収支表 */}
      <div className="label mt-4 mb-2 px-1">日次の収支</div>
      <div className="card overflow-hidden">
        <div className="overflow-x-auto scroll-thin">
          <table className="w-full text-[12px]">
            <thead>
              <tr className="bg-ink-50 text-ink-500">
                <th className="text-left font-bold px-3 py-2 whitespace-nowrap">日付</th>
                <th className="text-right font-bold px-2 py-2 whitespace-nowrap">売上</th>
                <th className="text-right font-bold px-2 py-2 whitespace-nowrap">原価</th>
                <th className="text-right font-bold px-3 py-2 whitespace-nowrap">粗利</th>
              </tr>
            </thead>
            <tbody>
              {days.map(d=>{ const pr=d.sales-d.cost; return (
                <tr key={d.date} className="border-t border-ink-100">
                  <td className="px-3 py-2 num whitespace-nowrap">{(+d.date.slice(5,7))+"/"+(+d.date.slice(8,10))}</td>
                  <td className="px-2 py-2 num text-right whitespace-nowrap">{d.sales?yen(d.sales):"–"}</td>
                  <td className="px-2 py-2 num text-right text-rose-600 whitespace-nowrap">{d.cost?yen(d.cost):"–"}</td>
                  <td className={"px-3 py-2 num text-right font-bold whitespace-nowrap "+(pr>=0?"text-emerald-600":"text-rose-600")}>{yen(pr)}</td>
                </tr>);})}
              {!days.length && <tr><td colSpan="4" className="text-center text-ink-400 py-8">この月の書類はありません</td></tr>}
            </tbody>
            {days.length>0 && (

/* ============================== 撮影 / 取込（連続スキャン＋未確認トレイ） ============================== */
function Capture({onScanned, pending, onOpen, onBulkConfirm, projects}){
  const [phase,setPhase] = useState("idle"); // idle | scanning
  const [picked,setPicked] = useState(null);
  const shoot = (shot)=>{ if(phase==="scanning")return; setPicked(shot); setPhase("scanning");
    setTimeout(()=>{ onScanned(shot.result, shot.tint); setPhase("idle"); setPicked(null); }, 1500); };
  const pname=(pid)=>(projects.find(p=>p.id===pid)||{}).name||"";
  const readyCount = pending.filter(isReady).length;
  return (
    <div className="pb-28">
      <Header title="書類を撮影" sub="続けて撮ってOK。あとでまとめて確認" />
      <div className="px-4 pt-4">
        {/* カメラビュー */}
        <div className="relative rounded-2xl overflow-hidden bg-ink-900 aspect-[4/3] flex items-center justify-center">
          {phase==="scanning" && picked ? (
            <div className={"absolute inset-0 bg-gradient-to-br "+picked.tint+" flex items-center justify-center"}>
              <div className="text-ink-400 text-6xl">{(DOCTYPE[picked.result.type]||{icon:"📄"}).icon}</div>
              <div className="absolute left-0 right-0 h-1 bg-brand-400/80 shadow-[0_0_20px_6px_rgba(251,146,60,.6)]" style={{animation:"fadeup 1.2s ease-in-out infinite alternate", top:"30%"}}></div>
              <div className="absolute bottom-0 inset-x-0 bg-black/60 text-white text-center py-3">
                <span className="inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full spin align-middle mr-2"></span>
                <span className="font-bold text-[13px] align-middle">AIが解析中…</span>
              </div>
            </div>
          ) : (
            <>
              <div className="absolute inset-6 border-2 border-dashed border-white/30 rounded-xl"></div>
              <div className="text-center text-white/70">
                <div className="text-5xl mb-2">📷</div>
                <div className="text-[13px] font-bold">枠内に書類を入れて撮影</div>
                <div className="text-[11px] text-white/50 mt-1">請求書・納品書・発注書・領収書に対応</div>
              </div>
            </>
          )}
        </div>
        {/* 撮影ボタン */}
        <button onClick={()=>shoot(sampleShots[0])} disabled={phase==="scanning"}
          className="tap w-full mt-4 py-4 rounded-2xl bg-brand-500 text-white font-black text-[15px] shadow-lg shadow-brand-200 disabled:opacity-50">📷 スキャンする</button>
        {/* サンプル選択 */}
        <div className="mt-5">
          <div className="text-[12px] text-ink-500 font-bold mb-2 px-1">サンプル書類でためす（続けてタップOK）</div>
          <div className="grid grid-cols-4 gap-2">
            {sampleShots.filter(s=>s.result.kind!=="report").map(s=>(
              <button key={s.id} onClick={()=>shoot(s)} disabled={phase==="scanning"}
                className={"tap rounded-xl aspect-[3/4] bg-gradient-to-br "+s.tint+" border border-ink-200 flex flex-col items-center justify-center gap-1 disabled:opacity-50"}>
                <span className="text-2xl">{(DOCTYPE[s.result.type]||{icon:"⚠️"}).icon}</span>
                <span className="text-[10px] font-bold text-ink-700 leading-tight text-center px-0.5">{s.face}</span>
              </button>
            ))}
          </div>
        </div>

        {/* 未確認トレイ */}
        {pending.length>0 && (
          <div className="mt-6">
            <div className="flex items-center justify-between mb-2 px-1">
              <span className="text-[13px] font-black text-ink-800">未確認トレイ（{pending.length}）</span>
              {readyCount>0 && <button onClick={onBulkConfirm} className="tap text-[12px] font-black text-brand-600">OKな{readyCount}件をまとめて保存</button>}
            </div>
            <div className="space-y-2">
              {pending.map(it=>{
                const ready=isReady(it);
                return (
                  <button key={it._id} onClick={()=>onOpen(it)} className="tap card w-full text-left p-3 flex items-center gap-3 active:bg-ink-50">
                    <div className={"w-10 h-10 rounded-xl flex items-center justify-center text-lg bg-gradient-to-br "+(it._tint||"from-ink-100 to-ink-50")}>{(DOCTYPE[it.type]||{icon:"⚠️"}).icon}</div>
                    <div className="flex-1 min-w-0">
                      <div className="font-bold text-ink-900 truncate">{it.partner||"（取引先を確認）"}</div>
                      <div className="text-[11px] text-ink-500 truncate">{it.total?yen(it.total):"金額を確認"}{it.pid_hint&&!it.project_new?"・"+pname(it.pid_hint):it.project_new?"・"+it.project_new+"(新規)":""}</div>
                    </div>
                    {ready
                      ? <span className="chip bg-emerald-50 text-emerald-700 border border-emerald-200">OK</span>
                      : <span className="chip bg-amber-100 text-amber-800 border border-amber-200">要確認</span>}
                  </button>
                );
              })}
            </div>
            <div className="gloss mt-2">「OK」は現場も金額も確定済み。まとめて保存できます。「要確認」はタップして直してから保存。</div>
          </div>
        )}
      </div>
    </div>
  );
}

function Review({data, projects, docs, onSave, onCancel, onCreateProject, wide}){
  const dpid = data.pid_hint || "";
  const initItems = (data.items && data.items.length)
    ? data.items.map(it=>({ name:it.name||"", amount:(it.unread||it.amount==null)?null:it.amount, pid:("pid" in it)?it.pid:dpid, _naming:!!it.needName, _name:(it.needName?(data.project_new||""):""), source:it.source||"ocr" }))
    : [{ name:"書類全体", amount:(data.total>0?data.total:null), pid:dpid, source:"whole" }];
  const [siteName,setSiteName] = useState("");
  const [type,setType] = useState(data.type||"invoice");
  const [dir,setDir]   = useState(data.dir||"cost");
  const [partner,setPartner] = useState(data.partner||"");
  const [date,setDate] = useState(data.date||TODAY);
  const [origTotal,setOrigTotal] = useState(data.total||0);
  const [items,setItems] = useState(initItems);
  const [imgOpen,setImgOpen] = useState(true);
  const [zoom,setZoom] = useState(false);
  const [hi,setHi] = useState(-1);
  const [creating,setCreating] = useState(false);
  const [newName,setNewName] = useState(data.project_new||"");

  const pname=(pid)=>(projects.find(p=>p.id===pid)||{}).name||"";
  const setItem=(i,patch)=>setItems(arr=>arr.map((it,j)=>j===i?{...it,...patch}:it));
  const addItem=()=>setItems(arr=>[...arr,{name:"",amount:null,pid:"",source:"manual"}]);
  const removeItem=(i)=>setItems(arr=>arr.filter((_,j)=>j!==i));
  const openImg=(i)=>{ setHi(i); setZoom(true); };

  const sum = items.reduce((s,it)=>s+(it.amount||0),0);
  const diff = origTotal>0 ? origTotal - sum : 0;
  const needAmt = items.filter(it=>it.amount==null).length;
  const needNm  = items.filter(it=>!(it.name||"").trim()).length;
  const unassigned = items.filter(it=>!it.pid).length;
  const groups = useMemo(()=>{
    const g={};
    items.forEach((it,idx)=>{ const k=it.pid||"__none"; (g[k]=g[k]||{pid:it.pid||"",rows:[],sum:0}).rows.push({...it,idx}); g[k].sum+=(it.amount||0); });
    return Object.values(g).sort((a,b)=>(a.pid?1:0)-(b.pid?1:0));
  },[items]);
  const alloc = groups.filter(gp=>gp.pid).map(gp=>({ pid:gp.pid, amount:gp.sum, memo:(gp.rows.find(r=>r.name)||{}).name||"" }));
  const dup = !data._existing && origTotal>0 && (docs||[]).some(d=> dupKey(d)===((partner||"").trim()+"|"+date+"|"+origTotal));
  const commitNewSite=(idx)=>{ const nm=((items[idx]||{})._name||"").trim(); if(!nm)return; const id=onCreateProject(nm); setItem(idx,{pid:id,_naming:false,_name:""}); };
  const onSiteChange=(idx,val)=>{ if(val==="__new__") setItem(idx,{_naming:true,pid:""}); else setItem(idx,{pid:val,_naming:false}); };

  const blockers=[];
  if(!partner.trim()) blockers.push("取引先");
  if(needNm>0) blockers.push("品名"+needNm);
  if(needAmt>0) blockers.push("金額"+needAmt);
  if(unassigned>0) blockers.push("現場"+unassigned);
  if(diff!==0) blockers.push("総額ズレ");
  const canSave = blockers.length===0 && alloc.length>0;
  const newSitePending = data.project_new && !projects.some(p=>p.name===data.project_new);

  const ItemRow = ({row})=>(
    <div className="border-t border-ink-100 pt-2.5 first:border-0 first:pt-0">
      <button onClick={()=>openImg(row.idx)} className="tap w-full text-left flex items-center justify-between gap-2">
        <span className="text-[13px] text-ink-800 truncate">{row.name||"（品名なし）"}</span>
        <span className="text-[11px] text-brand-600 font-bold whitespace-nowrap">原本🔍</span>
      </button>
      <div className="flex gap-2 mt-1.5">
        <input type="number" value={row.amount==null?"":row.amount} placeholder="読取不可・入力"
          onChange={e=>setItem(row.idx,{amount:e.target.value===""?null:+e.target.value})}
          className={"field num text-right py-2 w-1/3"+(row.amount==null?" border-amber-400 ring-2 ring-amber-200 bg-amber-50":"")} />
        {row._naming ? (
          <div className="flex gap-1 items-center flex-1">
            <input value={row._name||""} placeholder="新しい現場名" onChange={e=>setItem(row.idx,{_name:e.target.value})} onKeyDown={e=>{ if(e.key==="Enter") commitNewSite(row.idx); }} className="field py-2 flex-1 bg-blue-50 ring-2 ring-blue-300" />
            <button onClick={()=>commitNewSite(row.idx)} className="tap shrink-0 px-3 rounded-xl bg-blue-600 text-white text-[12px] font-black">登録</button>
          </div>
        ) : (
          <select value={row.pid} onChange={e=>onSiteChange(row.idx,e.target.value)}
            className={"field py-2 text-[13px] font-bold flex-1"+(!row.pid?" border-amber-400 ring-2 ring-amber-200 bg-amber-50":"")}>
            <option value="">現場を選ぶ</option>
            {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            <option value="__new__">＋ 新しい現場を登録…</option>
          </select>
        )}
        {row.source==="manual" && <button onClick={()=>removeItem(row.idx)} className="tap px-2 text-ink-400 text-[16px]">×</button>}
      </div>
    </div>
  );

  const imageSmall = data._tint ? (
    <div>
      <div className="flex items-center justify-between mb-1.5">
        <span className="text-[11px] text-ink-500 font-bold">撮影した書類（原本）</span>
        <button onClick={()=>setImgOpen(o=>!o)} className="tap text-[12px] text-brand-600 font-bold">{imgOpen?"画像を隠す ▲":"画像を表示 ▼"}</button>
      </div>
      {imgOpen && (
        <button onClick={()=>openImg(-1)} className="tap w-full block">
          <div className={"relative rounded-2xl overflow-hidden border border-ink-200 bg-gradient-to-br "+data._tint+" h-32 flex items-center justify-center"}>
            <div className="text-5xl opacity-50">{(DOCTYPE[type]||{icon:"📄"}).icon}</div>
            <span className="absolute bottom-2 right-2 chip bg-black/50 text-white">タップで拡大 🔍</span>
          </div>
        </button>
      )}
    </div>
  ) : (
    <div className="rounded-2xl border border-dashed border-ink-300 h-16 flex items-center justify-center text-ink-400 text-[12px] font-bold">手入力（写真なし）</div>
  );

  const imageBig = data._tint ? (
    <div className="h-full flex flex-col">
      <div className="text-[12px] text-ink-500 font-bold mb-2">撮影した書類（原本）・クリックで拡大</div>
      <button onClick={()=>openImg(-1)} className="tap flex-1 min-h-0 block">
        <div className={"relative w-full h-full min-h-[340px] rounded-2xl overflow-hidden border border-ink-200 bg-gradient-to-br "+data._tint+" flex items-center justify-center"}>
          <div className="text-8xl opacity-50">{(DOCTYPE[type]||{icon:"📄"}).icon}</div>
          <span className="absolute bottom-3 right-3 chip bg-black/50 text-white">拡大 🔍</span>
        </div>
      </button>
    </div>
  ) : (
    <div className="h-full min-h-[340px] rounded-2xl border border-dashed border-ink-300 flex items-center justify-center text-ink-400 text-[13px] font-bold">手入力（写真なし）</div>
  );

  const s = data._summary;
  const summaryBanner = s && (s.matched>0||s.created>0||s.need>0||s.lines>2) && (
    <div className="rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-600 text-white p-3.5 fadeup">
      <div className="text-[14px] font-black">✨ AIが自動で処理しました</div>
      <div className="text-[12px] mt-1.5 space-y-1 text-emerald-50">
        <div>📄 <b>{s.lines}明細</b>を読み取りました</div>
        {s.matched>0 && <div>🏗 <b>{s.matched}現場</b>を既存の案件に自動ひも付け（名寄せ）</div>}
        {s.created>0 && <div>🆕 <b>{s.created}現場</b>を新規案件として自動登録しました</div>}
        {s.need>0 && <div>✍ <b>{s.need}件</b>は新しい現場を検出 → 表の「工事名」欄で名前を入力してください</div>}
        {s.unread>0 && <div>🔎 <b>{s.unread}件</b>は金額をご確認ください</div>}
      </div>
    </div>
  );

  const alertsBlock = dup ? (
    <div className="rounded-xl bg-rose-50 border border-rose-200 p-3">
      <div className="text-[13px] font-black text-rose-700">⚠️ 同じ書類が登録済みかもしれません</div>
      <div className="text-[11px] text-rose-600 mt-0.5">取引先・日付・金額が一致する書類があります。二重計上に注意。</div>
    </div>
  ) : null;

  const headerCard = (
    <div className="card p-3 space-y-2">
      <div><div className="text-[11px] text-ink-500 font-bold mb-1">取引先</div>
        <input className={"field py-2"+(!partner.trim()?" border-amber-400 ring-2 ring-amber-200 bg-amber-50":"")} placeholder="読取不可・入力" value={partner} onChange={e=>setPartner(e.target.value)} /></div>
      <div className="grid grid-cols-2 gap-2">
        <div><div className="text-[11px] text-ink-500 font-bold mb-1">発行日</div><input type="date" className="field num py-2" value={date} onChange={e=>setDate(e.target.value)} /></div>
        <div><div className="text-[11px] text-ink-500 font-bold mb-1">請求金額（税込）</div><input type="number" className="field num text-right py-2" placeholder="0" value={origTotal||""} onChange={e=>setOrigTotal(+e.target.value)} /></div>
      </div>
      <div className="flex items-center gap-2 text-[12px] pt-0.5">
        <span className="text-ink-400 font-bold">区分</span>
        <button onClick={()=>setDir(dir==="cost"?"sales":"cost")} className={"tap chip border "+(dir==="cost"?"bg-rose-50 text-rose-700 border-rose-200":"bg-emerald-50 text-emerald-700 border-emerald-200")}>{dir==="cost"?"原価（仕入）":"売上（請求）"}</button>
        <span className="text-ink-300">·</span>
        <span className="text-ink-600 font-bold">{(DOCTYPE[type]||{}).label}</span>
        <span className="text-ink-400">AIが自動判定（違えばタップ）</span>
      </div>

    <div className="rounded-xl bg-amber-50 border border-amber-200 p-3 flex items-center justify-between gap-2">

    <button onClick={addItem} className="tap w-full py-3 rounded-xl border border-dashed border-ink-300 text-ink-600 font-bold text-[13px]">＋ 明細の行を追加（原本にあるのに未検出）</button>

    </div>
  ) : (
    <button onClick={()=>setCreating(true)} className="tap text-[13px] text-brand-600 font-black">＋ 新しい現場を登録</button>

  const siteBreakdown = alloc.length>0 && (
    <div className="flex flex-wrap items-center gap-1.5">
      <span className="text-[11px] text-ink-400 font-bold">現場別:</span>

/* ============================== エクスポート・モーダル（汎用） ============================== */
function ExportModal({exp, onClose, onCopied}){
  const { title, matrix } = exp;
  const tsv = matrix.map(r=>r.map(c=>c==null?"":String(c)).join("\t")).join("\n");
  const q=(s)=>{ s=String(s==null?"":s); return /[",\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const csv = matrix.map(r=>r.map(q).join(",")).join("\r\n");
  const copyPaste=()=>{ try{navigator.clipboard&&navigator.clipboard.writeText(tsv);}catch(e){} onCopied("コピーしました。Excelに貼り付けできます"); onClose(); };
  const download=()=>{ try{
      const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
      const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=(title||"現場そろばん")+".csv"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      onCopied("CSVをダウンロードしました");
    }catch(e){ onCopied("この環境ではダウンロード不可。コピーをご利用ください"); } onClose(); };
  return (
    <div className="fixed inset-0 z-[55] bg-black/50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white w-full max-w-[460px] rounded-2xl p-5 fadeup shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="font-black text-ink-900 text-[16px]">Excelへ出す</div>
        <div className="text-[12px] text-ink-500 mb-3">{title}・{Math.max(0,matrix.length-1)}行</div>
        <pre className="bg-ink-900 text-ink-100 text-[10px] rounded-xl p-3 overflow-auto scroll-thin num max-h-44" style={{whiteSpace:"pre"}}>{tsv}</pre>
        <div className="grid grid-cols-2 gap-2 mt-3">
          <button onClick={copyPaste} className="tap py-3 rounded-xl bg-brand-500 text-white font-black text-[13px]">Excelに貼る（コピー）</button>
          <button onClick={download} className="tap py-3 rounded-xl bg-ink-900 text-white font-black text-[13px]">CSVをダウンロード</button>
        </div>
        <div className="text-[11px] text-ink-400 mt-2 text-center">貼る＝そのままExcelへ／CSV＝会計にそのまま渡せる（日本語も文字化けしません）</div>
        <button onClick={onClose} className="tap w-full mt-3 py-2.5 rounded-xl bg-ink-100 text-ink-600 font-bold">閉じる</button>
      </div>
    </div>
  );
}

/* ============================== 取引先データ（自動蓄積） ============================== */
function Customers({docs, projects}){
  const list = useMemo(()=>{
    const m = {};
    docs.forEach(d=>{
      const k=d.partner; m[k]=m[k]||{name:k,cost:0,sales:0,count:0,last:""};
      m[k][d.dir]+=d.total; m[k].count++; if(d.date>m[k].last)m[k].last=d.date;
    });
    return Object.values(m).sort((a,b)=>(b.cost+b.sales)-(a.cost+a.sales));
  },[docs]);
  return (
    <div className="pb-28">
      <Header title="取引先データ" sub="書類から自動で貯まります" />
      <div className="px-4 pt-4 space-y-2">
        <div className="gloss mb-1">保存するたびに、取引先・取引額・最終取引日がAIで名寄せされて自動蓄積されます。</div>
        {list.map((c,i)=>(
          <div key={i} className="card p-3 flex items-center gap-3">
            <div className="w-9 h-9 rounded-full bg-ink-100 flex items-center justify-center font-black text-ink-500">{c.name[0]}</div>
            <div className="flex-1 min-w-0">
              <div className="font-bold text-ink-900 truncate">{c.name}</div>
              <div className="text-[11px] text-ink-500">取引{c.count}件・最終 {c.last}</div>
            </div>
            <div className="text-right text-[11px]">
              {c.sales>0 && <div className="num text-emerald-600 font-bold">売上 {man(c.sales)}</div>}
              {c.cost>0 && <div className="num text-rose-600 font-bold">仕入 {man(c.cost)}</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

          </Sec>

          <Sec n="4" title="OCR：OpenAI Vision API 仕様（2種）">
            <div className="impl"><b>呼び出し</b>：Backend workflow → POST <code>api.openai.com/v1/chat/completions</code>、model=<code>gpt-4o</code>、image_url＋プロンプト、<code>response_format: json_object</code>。まず <b>kind(invoice/report)</b> を判定して分岐。<b>読み取れない値は null</b>（＝UIで"要編集"黄色表示）。<b>各明細に bbox</b>（正規化座標）を返させ、行タップで原本ハイライト。</div>
            <pre className="bg-ink-900 text-emerald-200 text-[10.5px] rounded-xl p-3 overflow-x-auto scroll-thin" style={{whiteSpace:"pre"}}>{`// 請求書
{ "kind":"invoice", "direction":"cost|sales",
  "partner":"取引先名", "doc_date":"YYYY-MM-DD", "total":0, "doc_no":"",
  "items":[ {"name":"品名 or null","amount":0|null,
             "site_hint":"この行の現場名 or ''",
             "bbox":[x,y,w,h]} ],
  "confidence":0.0 }
// 日報
{ "kind":"report", "site_hint":"現場名", "date":"YYYY-MM-DD",
  "weather":"晴|曇|雨|雪", "workers":["氏名",...],
  "start_time":"HH:MM","end_time":"HH:MM",
  "work":"作業内容 or null", "materials":"" }`}</pre>
          </Sec>

          <Sec n="5" title="名寄せ＆現場の自動登録（感動の核）">
            <div className="impl">各 site_hint を<b>正規化（空白除去）して既存Project名と部分一致</b>で名寄せ → 見つかれば紐付け（例「A邸」→「大和ハウス様 A邸 新築」）。<br/>見つからなければ<b>Projectを自動作成</b>（auto=yes）してその場で紐付け。<br/>現場名が読めない/曖昧な明細だけ<b>行内で"現場名を入力→登録"</b>（find or create）。<br/>UIは"未割当/読取不可/総額ズレ"が残ると保存不可＝原価漏れ・二重計上を根絶。</div>
          </Sec>

          <Sec n="6" title="集計・出力">
            <Row k="現場原価" v="Σ Item(direction=cost).amount を project で合算（実額積み上げ）" />
            <Row k="現場売上" v="Σ 売上明細.amount（無ければ sales_expected）" />
            <Row k="粗利/率" v="売上−原価 ／ 粗利÷売上×100（売上0は0%）" />
            <Row k="日次入出金" v="doc_date でグループ、direction別に 入金(sales)/出金(cost) を合算" />
            <Row k="日報一覧" v="Report を現場・日付で一覧／CSV" />
            <div className="gloss"><b>CSV</b>＝Download data as CSV。<b>Excel貼付</b>＝登録時に明細をTSVで自動クリップボードコピー（"Copy to clipboard"）。重複検知＝取引先＋日付＋原本合計の一致で警告。</div>
          </Sec>

          <Sec n="7" title="権限・セキュリティ">
            <Row k="管理者(事務所)" v="全現場・利益・アップロード・修正・CSV" />
            <Row k="担当(現場)" v="自分の現場の利益閲覧＋スキャン" />
            <div className="gloss">Privacy Rules で現場スコープを制御。<b>API Key はBackend workflowに隠蔽</b>し、画像→OCR→保存もBackendで実行（クライアントに鍵を出さない）。</div>
          </Sec>

          <Sec n="8" title="Phase2以降">
            <Row k="労務原価" v="日報の 作業員×時間×日当 を現場原価に加算し粗利に反映" />
            <Row k="支払/入金" v="支払期日・入金消込でキャッシュフロー" />
            <Row k="会計連携" v="freee/マネフォへ自動仕訳、電帳法対応の原本保管" />
          </Sec>
        </div>
      </div>
    </div>
  );
}

        <div className="p-5 overflow-auto space-y-4">{fields}</div>
      </div>

  return (
    <div className="pb-28">
      <Header title="作業日報の確認" sub="原本と見くらべて登録" onBack={onCancel} />
      <div className="px-4 pt-4 space-y-4">{fields}</div>
      {footer}
    </div>
  );

/* ============================== 管理画面（PC・最小構成） ============================== */
function Desktop({projects, docs, reports, agg, totals, createProject, resolveScan, saveDoc, saveReport, updateDoc, deleteDoc, onExport, flash, autoIngest, ingest, resetDemo, loadDemo, deleteBill}){
  const empty = docs.length===0 && reports.length===0;
  const [review,setReview] = useState(null);
  const [picker,setPicker] = useState(false);
  const [scanMsg,setScanMsg] = useState(null);
  const fileRef = useRef(null);
  const [drag,setDrag] = useState(false);
  const uploadMain=()=>doScan(sampleShots.find(s=>s.id==="s9"));
  const [view,setView] = useState("bill"); // bill | report
  const [guide,setGuide] = useState(false);
  const doScan=(shot)=>{ setPicker(false);
    const rep=shot.result.kind==="report";
    const msgs=rep?["📄 日報を読み取り中…","🏗 現場を名寄せ中…","✅ もうすぐ完了…"]:["📄 明細を読み取り中…","🏗 現場を名寄せ中…","✨ 新規案件を判定中…","✅ もうすぐ完了…"];
    let i=0; setScanMsg(msgs[0]);
    const iv=setInterval(()=>{ i++; if(i<msgs.length) setScanMsg(msgs[i]); }, 620);
    setTimeout(()=>{ clearInterval(iv); setScanMsg(null); if(shot.result.fail){ flash("うまく読み取れませんでした。もう一度アップロードしてください"); } else if(rep){ setReview({...shot.result, _tint:shot.tint}); } else { setReview(resolveScan({...shot.result, _tint:shot.tint})); } }, rep?1900:2500); };
  const doSave=(payload)=>{ if(review&&review._existing) deleteBill(review._existing); saveDoc(payload, null); setReview(null); };
  const doSaveReport=(r)=>{ saveReport(r); setReview(null); };
  const pname=(pid)=>(projects.find(p=>p.id===pid)||{}).name||"（未割当）";
  const mdShort=(s)=>(+s.slice(5,7))+"/"+(+s.slice(8,10));
  const repSorted = useMemo(()=>[...reports].sort((a,b)=>b.date.localeCompare(a.date)),[reports]);
  const exRep=(kind)=>onExport({kind,title:"日報一覧",matrix:[["作業日","現場","天候","作業員","開始","終了","作業内容","使用資材"],...repSorted.map(r=>[r.date,pname(r.pid),(r.weather||"").replace(/[^晴曇雨雪]/g,""),(r.workers||[]).join("・"),r.start,r.end,r.work,r.materials||""])]});

  const bills = useMemo(()=>{ const m={}; docs.forEach((d,i)=>{ const k=dupKey(d); if(!m[k]) m[k]={key:k,partner:d.partner,date:d.date,type:d.type,dir:d.dir,src:(d.src!=null?d.src:0),items:[],ord:i,sites:{}}; m[k].items.push(d); m[k].sites[d.pid]=1; }); return Object.values(m).map(b=>({...b,total:b.items.reduce((s,x)=>s+x.total,0),siteN:Object.keys(b.sites).length})).sort((a,b)=>b.date.localeCompare(a.date)||b.ord-a.ord); },[docs]);
  const openBill=(b)=>setReview({ _existing:b.key, type:b.type, dir:b.dir, partner:b.partner, date:b.date, total:(b.src||b.total), items:b.items.map(x=>({name:x.memo,amount:x.total,pid:x.pid})), _tint:"from-orange-100 to-amber-50" });
  const [q,setQ] = useState("");
  const billsView = useMemo(()=>{ const kw=q.trim(); if(!kw)return bills; return bills.filter(b=>(b.partner||"").includes(kw)||b.items.some(x=>(x.memo||"").includes(kw))||Object.keys(b.sites).some(pid=>pname(pid).includes(kw))); },[bills,q]);
  const months = useMemo(()=>{ const s={}; docs.forEach(d=>s[(d.date||"").slice(0,7)]=1); return Object.keys(s).filter(Boolean).sort().reverse(); },[docs]);
  const [mi,setMi] = useState(0);
  const month = months.length ? months[Math.min(mi,months.length-1)] : "";
  const monthLbl = month ? month.slice(0,4)+"年"+(+month.slice(5,7))+"月" : "";
  const flow = useMemo(()=>{ const g={}; docs.forEach(d=>{ if(month && (d.date||"").slice(0,7)!==month) return; g[d.date]=g[d.date]||{date:d.date,inc:0,out:0}; if(d.dir==="sales")g[d.date].inc+=d.total; else g[d.date].out+=d.total; }); return Object.values(g).sort((a,b)=>b.date.localeCompare(a.date)); },[docs,month]);
  const flowTotal = flow.reduce((t,f)=>({inc:t.inc+f.inc,out:t.out+f.out}),{inc:0,out:0});

/* ============================== 現場アプリ（スマホ） ============================== */
function MobileApp({projects, docs, pending, agg, totals, createProject, addPending, saveDoc, bulkConfirm, onExport, framed}){
  const [tab,setTab] = useState("home");
  const [openPid,setOpenPid] = useState(null);
  const [review,setReview] = useState(null);
  const [readFail,setReadFail] = useState(false);
  const blankDoc={ type:"invoice", dir:"cost", partner:"", date:TODAY, total:0, items:[], pid_hint:"" };

  const onScanned=(r,tint)=>{ if(r.fail){ setReadFail(true); } else { addPending(r,tint); } };
  const doSave=(payload)=>{ const fromTray=review&&review._id!=null; saveDoc(payload, fromTray?review._id:null); setReview(null); setTab(fromTray?"capture":"home"); };

  let screen;
  if(readFail) screen = <ReadFailed onRetry={()=>{ setReadFail(false); setTab("capture"); }} onManual={()=>{ setReadFail(false); setReview(blankDoc); }} />;
  else if(review) screen = <Review data={review} projects={projects} docs={docs} onSave={doSave} onCancel={()=>setReview(null)} onCreateProject={createProject} />;
  else if(openPid) screen = <Project p={agg.find(p=>p.id===openPid)} docs={docs} onBack={()=>setOpenPid(null)} onExport={onExport} />;
  else if(tab==="capture") screen = <Capture onScanned={onScanned} pending={pending} projects={projects} onOpen={(it)=>setReview(it)} onBulkConfirm={bulkConfirm} />;
  else screen = <Home agg={agg} totals={totals} docs={docs} onOpen={setOpenPid} onExport={onExport} />;

  const showNav = !review && !openPid && !readFail;
  const navBar = showNav && (
    <div className={(framed?"absolute":"fixed")+" bottom-0 inset-x-0 max-w-[430px] mx-auto bg-white border-t border-ink-200 flex z-40"}>
      {[["home","案件"],["capture","スキャン"]].map(([id,label])=>(
        <button key={id} onClick={()=>{setTab(id);setOpenPid(null);}} className={"relative flex-1 py-3.5 text-[13px] font-black "+(tab===id?"text-brand-600":"text-ink-400")}>
          {tab===id && <span className="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-0.5 bg-brand-500 rounded-full"></span>}
          {label}
          {id==="capture" && pending.length>0 && <span className="absolute top-2.5 right-[28%] min-w-4 h-4 px-1 rounded-full bg-rose-500 text-white text-[10px] font-black inline-flex items-center justify-center">{pending.length}</span>}
        </button>
      ))}
    </div>
  );
  if(framed) return (
    <div className="h-full flex flex-col relative bg-ink-50">
      <div className="flex-1 overflow-y-auto scroll-thin">{screen}</div>
      {navBar}
    </div>
  );
  return (
    <div className="w-full max-w-[430px] bg-ink-50 min-h-screen relative shadow-2xl">
      {screen}
      {navBar}
    </div>
  );
}

  const [device,setDevice] = useState("pc"); // pc | field
  const [ingest,setIngest] = useState(null); // {n,total}
  const idRef = useRef(1);
  const genId = ()=> idRef.current++;
  const flash = (m)=>{ setToast(m); setTimeout(()=>setToast(""),2200); };

  const agg = useAgg(projects, docs);
  const totals = useMemo(()=>{
    const t={sales:0,cost:0}; agg.forEach(p=>{t.sales+=p.sales;t.cost+=p.cost});
    t.profit=t.sales-t.cost; t.rate=t.sales?Math.round(t.profit/t.sales*100):0; return t;
  },[agg]);

  const createProject=(name)=>{ const id="P_"+genId()+"_"+name.replace(/\s/g,"").slice(0,4); setProjects(ps=>[...ps,{ id, name, client:"（新規）", sales:0 }]); flash(`現場「${name}」を登録しました`); return id; };
  const matchSite=(raw)=>{ const n=(raw||"").replace(/[\s　]/g,""); if(!n)return null; return projects.find(p=>{ const pn=(p.name||"").replace(/[\s　]/g,""); return pn && (pn.includes(n)||n.includes(pn)); }); };
  // スキャン結果を解決：現場名を既存案件に名寄せ、無ければ自動登録、判別不能は要命名。感動ポイント。
  const resolveScan=(result)=>{
    const items0 = (result.items&&result.items.length) ? result.items : [{ name:"書類全体", amount:result.total, siteRaw: result.pid_hint?null:"" }];
    const map={}, newProjs=[], matched=new Set(), created=new Set(); let need=0, unread=0;
    const items = items0.map(it=>{
      const amount = (it.unread||it.amount==null)?null:it.amount;
      if(amount==null) unread++;
      if(it.pid) return { name:it.name||"", amount, pid:it.pid, source:"ocr" };
      const raw=(it.siteRaw||"").trim();
      if(!raw){ need++; return { name:it.name||"", amount, pid:"", needName:true, source:"ocr" }; }
      if(map[raw]) return { name:it.name||"", amount, pid:map[raw], source:"ocr" };
      const hit=matchSite(raw);
      if(hit){ map[raw]=hit.id; matched.add(hit.name); return { name:it.name||"", amount, pid:hit.id, source:"ocr" }; }
      const id="AUTO_"+raw; map[raw]=id; created.add(raw); newProjs.push({ id, name:raw, client:"（スキャン自動作成）", sales:0, auto:true });
      return { name:it.name||"", amount, pid:id, source:"ocr" };
    });
    if(newProjs.length) setProjects(ps=>{ const have=new Set(ps.map(p=>p.name)); return [...ps, ...newProjs.filter(np=>!have.has(np.name))]; });
    return { ...result, items, _summary:{ lines:items.length, matched:matched.size, created:created.size, need, unread } };
  };
  const addPending=(r,tint)=>{ const rr=resolveScan(r); setPending(p=>[...p,{ ...rr, _id:genId(), _tint:tint }]); flash("トレイに追加しました"); };
  const saveDoc=(payload,pendingId)=>{
    const lines = (payload.lines&&payload.lines.length) ? payload.lines
      : (payload.allocations||[]).map(a=>({ name:a.memo, amount:a.amount, pid:a.pid, site:(projects.find(p=>p.id===a.pid)||{}).name||"" }));
    // 1行1品目で保存（明細を残す）。集計は pid で合算されるので粗利・入出金は不変
    setDocs(d=>{ const out=[...d]; lines.forEach((l,i)=>out.push({ id:"D"+genId()+"_"+i, pid:l.pid, type:payload.type, dir:payload.dir, partner:payload.partner, date:payload.date, total:l.amount, src:payload.total, memo:l.name||"" })); return out; });
    if(pendingId!=null) setPending(p=>p.filter(x=>x._id!==pendingId));
    // 登録した瞬間、明細をクリップボードへ（Excelにそのまま貼付）
    try{
      const tsv = [["発行日","取引先","品名・摘要","金額(税込)","工事名"], ...lines.map(l=>[payload.date, payload.partner, l.name||"", l.amount==null?"":l.amount, l.site||(projects.find(p=>p.id===l.pid)||{}).name||""])].map(r=>r.join("\t")).join("\n");
      if(navigator.clipboard) navigator.clipboard.writeText(tsv);
    }catch(e){}
    flash("登録しました。Excelに貼り付けできます（コピー済）✓");
  };
  const bulkConfirm=()=>{
    const ready = pending.filter(isReady); if(!ready.length) return;
    let saved=0, skipped=0;
    setDocs(d=>{ const out=[...d]; ready.forEach(r=>{
      if(out.some(x=>dupKey(x)===dupKey({partner:r.partner,date:r.date,src:r.total}))){ skipped++; return; }
      const lines=(r.items&&r.items.length)?r.items:[{name:r.partner,amount:r.total,pid:r.pid_hint}];
      lines.forEach((l,i)=>out.push({ id:"D"+genId()+"_b"+i, pid:l.pid, type:r.type, dir:r.dir, partner:r.partner, date:r.date, total:l.amount, src:r.total, memo:l.name||"" }));
      saved++;
    }); return out; });
    const ids=new Set(ready.map(r=>r._id)); setPending(p=>p.filter(x=>!ids.has(x._id)));
    flash(`${saved}件を保存${skipped?`（重複${skipped}件はスキップ）`:""} ✓`);
  };
  const saveReport=(f)=>{ if(f.id){ setReports(rs=>rs.map(r=>r.id===f.id?f:r)); } else { setReports(rs=>[...rs,{ ...f, id:"R"+genId()+"_"+f.date }]); } flash("日報を保存しました ✓"); };
  const updateDoc=(id,patch)=>{ setDocs(ds=>ds.map(d=>d.id===id?{...d,...patch}:d)); flash("修正しました ✓"); };
  const deleteDoc=(id)=>{ setDocs(ds=>ds.filter(d=>d.id!==id)); flash("削除しました"); };
  const deleteBill=(key)=>{ setDocs(ds=>ds.filter(d=>dupKey(d)!==key)); };
  const resetDemo=()=>{ setProjects([]); setDocs([]); setReports([]); setPending([]); flash("空にしました。最初の1枚をどうぞ"); };
  const loadDemo=()=>{ setProjects(seedProjects); setDocs(seedDocs); setReports(seedReports); flash("サンプルを読み込みました"); };

  const autoIngest=()=>{
    if(ingest) return;
    setDocs(ds=>ds.filter(d=>!String(d.id).startsWith("AD_")));
    setProjects(ps=>ps.filter(p=>!p.auto));
    setIngest({n:0,total:demoBatch.length});
    const step=(i)=>{
      if(i>=demoBatch.length){ setIngest(null); flash("スキャン完了：案件マスタ・原価・支払いを自動作成 ✓"); return; }
      const inv=demoBatch[i];
      setProjects(ps=>{ const have=new Set(ps.map(p=>p.name)); const add=[]; inv.lines.forEach(l=>{ if(!have.has(l.site)){ have.add(l.site); add.push({ id:"AUTO_"+l.site, name:l.site, client:"（スキャン自動作成）", sales:0, auto:true }); } }); return add.length?[...ps,...add]:ps; });
      const total=inv.lines.reduce((s,l)=>s+l.amount,0);
      setDocs(ds=>[...ds, ...inv.lines.map((l,j)=>({ id:"AD_"+i+"_"+j, pid:"AUTO_"+l.site, type:inv.type, dir:inv.dir, partner:inv.partner, date:inv.date, total:l.amount, src:total, memo:l.name }))]);
      setIngest({n:i+1,total:demoBatch.length});
      setTimeout(()=>step(i+1), 650);
    };
    setTimeout(()=>step(0), 250);
  };

  const shared={ projects, docs, reports, pending, agg, totals, createProject, addPending, resolveScan, saveDoc, updateDoc, deleteDoc, bulkConfirm, saveReport, onExport:setExp, flash, resetDemo, loadDemo, deleteBill };

  return (
    <div className="min-h-screen bg-ink-200">
      <div className="sticky top-0 z-[60] bg-ink-50/90 backdrop-blur border-b border-ink-200 flex items-center justify-center py-2 px-3">
        <div className="inline-flex bg-ink-100 rounded-full p-0.5 text-[12px] font-bold">
          <button onClick={()=>setDevice("pc")} className={"tap px-4 py-1 rounded-full transition-colors "+(device==="pc"?"bg-white text-ink-900 shadow-sm":"text-ink-500")}>事務所</button>
          <button onClick={()=>setDevice("field")} className={"tap px-4 py-1 rounded-full transition-colors "+(device==="field"?"bg-white text-ink-900 shadow-sm":"text-ink-500")}>現場</button>
        </div>
      </div>
      {device==="pc"
        ? <Desktop {...shared} autoIngest={autoIngest} ingest={ingest} />
        : (
          <div className="flex flex-col items-center py-8 gap-3">
            <div className="relative w-[400px] max-w-[94vw] rounded-[2.75rem] bg-ink-900 p-3 shadow-2xl">
              <div className="absolute top-3 left-1/2 -translate-x-1/2 w-32 h-6 bg-ink-900 rounded-b-2xl z-[55]"></div>
              <div className="relative w-full rounded-[2.1rem] overflow-hidden bg-ink-50" style={{height:"min(800px,82vh)"}}>
                <MobileApp framed {...shared} />
              </div>
            </div>
            <p className="text-[12px] text-ink-500 font-bold">現場のスマホ画面 — 事務所と同じ数字がそのまま見えます</p>
          </div>
        )}
      {exp && <ExportModal exp={exp} onClose={()=>setExp(null)} onCopied={flash} />}
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
